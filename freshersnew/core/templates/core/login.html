{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Freshers Championship 2026</title>
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;0,700;1,400&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .login-container {
            background: #111;
            border: 1px solid #222;
            padding: 3rem;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, #ff6b00, transparent, #ff9f00);
            z-index: -1;
            border-radius: 18px;
            opacity: 0.3;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .login-logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: #ff6b00;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }
        .login-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: #fff;
            margin: 0;
            line-height: 1;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            color: #888;
            font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 1rem;
            border-radius: 8px;
            color: #fff;
            font-family: 'Barlow', sans-serif;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #ff6b00;
            outline: none;
            background: #222;
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff6b00, #ff9f00);
            color: #fff;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,107,0,0.3);
        }
        .messages {
            margin-bottom: 1.5rem;
            list-style: none;
            padding: 0;
        }
        .messages li {
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            background: rgba(220, 38, 38, 0.1);
            color: #f87171;
            border: 1px solid rgba(220, 38, 38, 0.2);
            text-align: center;
        }
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,107,0,0.05) 0%, transparent 70%);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">UCSC</div>
            <h1 class="login-title">LOGIN PORTAL</h1>
        </div>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>User Type</label>
                <select name="user_type" required>
                    <option value="STUDENT">Student</option>
                    <option value="COACH">Coach</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
    </div>
</body>
</html>
